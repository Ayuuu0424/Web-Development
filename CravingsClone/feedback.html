<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />

    <title>Feedback - Cravings</title>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Cravings</a>
      </div>
    </nav>

    <!-- FEEDBACK SECTION -->
    <section class="full-bg feedback-bg">
      <div class="container h-100">
        <div class="row h-100 align-items-center justify-content-end">
          <div class="col-md-5">
            <div class="form-card">
              <h3 class="fw-bold text-primary">Share Feedback</h3>
              <p class="text-secondary mb-4">
                Help us improve your experience.
              </p>

              <form>
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" />
                </div>

                <div class="mb-3">
                  <label class="form-label">Category</label>
                  <select class="form-control">
                    <option>Food Quality</option>
                    <option>Delivery Experience</option>
                    <option>App & Website</option>
                    <option>Support</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Rating</label>
                  <div class="stars">☆ ☆ ☆ ☆ ☆</div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Feedback</label>
                  <textarea rows="4" class="form-control"></textarea>
                </div>

                <button class="btn btn-primary w-100">Submit Feedback</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
