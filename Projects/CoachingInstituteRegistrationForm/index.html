<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="bg-primary p-3">
        <h2 class="text-center">Institute Registration Form</h2>
      </div>
    </header>

    <main>
      <div class="container mt-4 p-5 bg-dark rounded border shadow">
        <form>
          <section class="bg-white p-3 rounded border">
            <fieldset>
              <legend>Personal Details</legend>
              <div class="p-2 mt-2">
                <label for="fullName" class="form-label">FullName : </label>
                <input
                  type="text"
                  name="fullName"
                  id="fullName"
                  placeholder="Ayushi Patel"
                  class="form-control"
                />
                <span class="text-danger small" id="fullNameError" Error></span>
              </div>

              <div class="p-2 mt-2">
                <label for="fullName" class="form-label">Email : </label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  placeholder="ayushi65665@example.com"
                  class="form-control"
                />
                <span class="text-danger small" id="emailerror" Error></span>
              </div>

              <div class="p-2 mt-2">
                <label for="phone" class="form-label">Mobile Number : </label>
                <input
                  type="phone"
                  name="phone"
                  id="phone"
                  placeholder="9408872305"
                  class="form-control"
                />
                <span class="text-danger small" id="phoneerror" Error></span>
              </div>

              <div class="p-2 mt-2">
                <label for="phone" class="form-label">Date of Birth : </label>
                <input
                  type="date"
                  name="date"
                  id="date"
                  placeholder="24-04-2004"
                  class="form-control"
                />
                <span class="text-danger small" id="derror" Error></span>
              </div>
            </fieldset>
          </section>

          <section class="bg-white p-3 rounded border">
            <fieldset>
              <legend>Academic Details</legend>

              <div class="p-2 mt-2">
                <label for="qualification" class="form-label"
                  >Last Completed Qualification :
                </label>
                <select name="qualification" id="qualification">
                    <option value="">...</option>
                  <option value="10">Matriculation</option>
                  <option value="12">Intermediate</option>
                  <option value="diploma">Diploma</option>
                  <option value="UG">Graduation</option>
                  <option value="PG">Post Garduation</option>
                </select>
                <span
                  class="text-danger small"
                  id="qualificationerror"
                  Error
                ></span>
              </div>

              <div class="p-2 mt-2">
                <label for="grade" class="form-label"
                  >Percentage/Grade in Last Qualification :
                </label>
                <select name="qualification" id="qualification">
                    <option value="">...</option>
                  <option value="A">Excellent</option>
                  <option value="B">Good</option>
                  <option value="C">Satisfactory</option>
                  <option value="D">Average</option>
                  <option value="E">Poor</option>
                  <option value="F">Fail</option>
                </select>
                <span
                  class="text-danger small"
                  id="qualificationerror"
                  Error
                ></span>
              </div>
            </fieldset>
          </section>
        </form>
      </div>
    </main>

    <!-- ...Scripts... -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
