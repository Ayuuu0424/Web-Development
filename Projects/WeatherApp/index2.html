<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Weather App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <div class="glass-card p-4">
      <div
        class="d-flex flex-wrap justify-content-between align-items-center gap-3"
      >
        <div>
          <h2 id="city">Bhopal</h2>
          <p class="mb-1" id="weatherMain">Partly Sunny</p>
          <h1 class="temp-text"><span id="Temperature">11</span>°C</h1>
        </div>

        <div class="text-end">
          <img
            id="weatherIcon"
            class="weather-icon"
            src="https://openweathermap.org/img/wn/10d@2x.png"
          />
          <p id="dateTime"></p>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-md-10 mb-2">
          <input
            type="text"
            id="cityName"
            class="form-control form-control-lg"
            placeholder="Search city..."
          />
        </div>

        <div class="col-md-2">
          <button onclick="getWeather()" class="btn btn-light w-100 btn-lg">
            Search
          </button>
        </div>
      </div>

      <div class="row mt-4 g-4">
        <div class="col-lg-9">
          <div class="d-flex gap-3 overflow-auto pb-2">
            <div class="forecast-box">
              <p>Mon</p>
              <i class="bi bi-cloud-rain fs-2"></i>
              <h5>12°C</h5>
            </div>

            <div class="forecast-box">
              <p>Tue</p>
              <i class="bi bi-cloud-sun fs-2"></i>
              <h5>14°C</h5>
            </div>

            <div class="forecast-box">
              <p>Wed</p>
              <i class="bi bi-brightness-high fs-2"></i>
              <h5>18°C</h5>
            </div>

            <div class="forecast-box">
              <p>Thu</p>
              <i class="bi bi-cloud-drizzle fs-2"></i>
              <h5>10°C</h5>
            </div>

            <div class="forecast-box">
              <p>Fri</p>
              <i class="bi bi-cloud-lightning-rain fs-2"></i>
              <h5>9°C</h5>
            </div>

            <div class="forecast-box">
              <p>Sat</p>
              <i class="bi bi-cloud fs-2"></i>
              <h5>13°C</h5>
            </div>
          </div>

          <div class="row mt-4 g-3">
            <div class="col-md-4">
              <div class="small-card">
                <h6>Humidity</h6>
                <h2 id="humidity">60%</h2>
                <i class="bi bi-droplet-half fs-1"></i>
              </div>
            </div>

            <div class="col-md-4">
              <div class="small-card">
                <h6>Wind Speed</h6>
                <h2 id="wind">4 km/h</h2>
                <i class="bi bi-wind fs-1"></i>
              </div>
            </div>

            <div class="col-md-4">
              <div class="small-card">
                <h6>Pressure</h6>
                <h2 id="pressure">1021</h2>
                <i class="bi bi-speedometer2 fs-1"></i>
              </div>
            </div>

            <div class="col-md-6">
              <div class="small-card">
                <h6>Sunrise</h6>
                <h3 id="sunrise">06:10 AM</h3>
                <i class="bi bi-sunrise fs-1"></i>
              </div>
            </div>

            <div class="col-md-6">
              <div class="small-card">
                <h6>Sunset</h6>
                <h3 id="sunset">08:45 PM</h3>
                <i class="bi bi-sunset fs-1"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-3">
          <div class="right-panel p-3 rounded-4 h-100">
            <h5 class="mb-4">Weather Details</h5>

            <ul class="list-group list-group-flush">
              <li class="list-group-item d-flex justify-content-between">
                <span>Feels Like</span>
                <span id="feelsLike">10°C</span>
              </li>

              <li class="list-group-item d-flex justify-content-between">
                <span>Visibility</span>
                <span id="visibility">10 KM</span>
              </li>

              <li class="list-group-item d-flex justify-content-between">
                <span>Clouds</span>
                <span id="clouds">83%</span>
              </li>

              <li class="list-group-item d-flex justify-content-between">
                <span>Rain</span>
                <span id="rain">2.73 mm</span>
              </li>

              <li class="list-group-item d-flex justify-content-between">
                <span>Country</span>
                <span id="country">IT</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <script src="script2.js"></script>
  </body>
</html>
