<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Weather App</title>
  </head>

  <body>
    <div class="container d-flex justify-content-center align-items-center">
      <div class="card weather-card shadow-lg border-0 p-4 mt-5 mb-5">

        <div class="text-center mb-4">
          <h1 class="fw-bold text-white">Weather App</h1>
          <p class="text-light">Get live weather updates instantly</p>
        </div>

        <div class="input-group mb-4">
          <input
            type="text"
            class="form-control form-control-lg"
            placeholder="Enter city name"
            id="cityName"
          />
          <button class="btn btn-dark" onclick="getWeather()">
            <i class="bi bi-search"></i>
          </button>
        </div>

        <div id="weatherResult" class="d-none">

          <div class="text-center mb-3">
            <h2 id="city" class="fw-bold text-white"></h2>
            <p id="country" class="text-light"></p>
          </div>

          <div class="text-center">
            <img id="weatherIcon" src="" alt="Weather Icon" />
          </div>

          <div class="text-center mb-4">
            <h1 class="display-3 fw-bold text-white">
              <span id="Temperature"></span>°C
            </h1>
            <h5 id="description" class="text-uppercase text-light"></h5>
          </div>

          <div class="row g-3">
            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-moisture fs-2"></i>
                <h6 class="mt-2">Humidity</h6>
                <p id="humidity"></p>
              </div>
            </div>

            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-wind fs-2"></i>
                <h6 class="mt-2">Wind Speed</h6>
                <p id="wind"></p>
              </div>
            </div>

            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-clouds fs-2"></i>
                <h6 class="mt-2">Clouds</h6>
                <p id="clouds"></p>
              </div>
            </div>

            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-eye fs-2"></i>
                <h6 class="mt-2">Visibility</h6>
                <p id="visibility"></p>
              </div>
            </div>

            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-thermometer-half fs-2"></i>
                <h6 class="mt-2">Feels Like</h6>
                <p id="feelsLike"></p>
              </div>
            </div>

            <div class="col-6">
              <div class="card info-card text-center p-3">
                <i class="bi bi-speedometer2 fs-2"></i>
                <h6 class="mt-2">Pressure</h6>
                <p id="pressure"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
