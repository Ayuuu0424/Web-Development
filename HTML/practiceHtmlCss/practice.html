<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
   <form>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter ur name">
    <br>
    <label for="email">Email:</label>
    <input type="text" id="email" placeholder="Enter ur email">
    <br>
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter ur password">
    <br>
    <label for="age">Age:</label>
    <input type="number" id="age" placeholder="18">
    <br>
    <label for="url">URL:</label>
    <input type="url" id="url" placeholder="Enter ur URL">
    <br>
    <label for="date">Date of Birth:</label>
    <input type="date" id="date">
    <br>
    <label for="time">Time:</label>
    <input type="time" id="time">
    <br>
    <label for="datetime">Date & time:</label>
    <input type="datetime-local" id="datetime">
    <br>
    <label for="range">Range:</label>
    <input type="range" id="range">
    <br>
    <label for="color">Color:</label>
    <input type="color" id="color">
    <br>
    <!-- 🎀🎀accept attribute-restricts file type,multiple attribute-allows multiple files at a time🎀🎀 -->
    <label for="file">File upload:</label>
    <input type="file" id="file">
    <br>
    <!-- 🎀<input type="submit" name="Submit">🎀 -->
     <!-- 🎀🎀button tag default type = submit🎀🎀 -->
    <!-- 🎀<button type="submit">Submit</button>🎀 -->

    <br>
    <br>

    <select name="Something" id="Something">
      <!-- select tag me first option empty rkha jata h -->
      <option value=" ">Select Anything</option>
      <option value="spicy">Spicy</option>
      <option value="sweet">Sweet</option>
      <option value="sour">Sour</option>
      <option value="bitter">Bitter</option>
      <option value="salty">Salty</option>
    </select>

    <br>
    <br>

    <textarea 
    name="address" 
    id="address"
    placeholder="add ur address"
    ></textarea>

    <br>

    <button type="submit">Submit</button>

   </form>
  </body>
</html>
