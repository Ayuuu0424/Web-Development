<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Semantic Example</title>
  </head>
  <body>
    <form>
        <!-- 🎀🎀Radio-button and Checkbox🎀🎀 -->
        <div>
            <span>Gender:</span>

        <span>
            <label for="g1">Male</label>
            <input type="radio" name="gender" value="male" id="g1">
        </span>

        <span>
            <label for="g2">Female</label>
            <input type="radio" name="gender" value="female" id="g2">
        </span>
        </div>

        <br>

        <div>
            <span>Hobbies:</span>

            <span>
                <label for="h1">Painting</label>
                <input type="checkbox" value="painting" id="h1>
            </span>

            <span>
                <label for="h2">Crafting</label>
                <input type="checkbox" value="crafting" id="h2">
            </span>
        </div>

        <br>

        <!-- 🎀🎀Fieldset and Legend🎀🎀 -->

        <fieldset>
            <legend>Personal Details</legend>

            Name: <input type="text"><br>
            E-mail: <input type="text"><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Login Details</legend>

            UserName: <input type="text"><br>
            Password: <input type="text"><br>
        </fieldset>
    </form>

  </body>
</html>
