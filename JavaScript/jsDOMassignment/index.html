<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <div class="d-flex flex-column gap-3">
        <input
          type="text"
          id="fullName"
          placeholder="Enter your name"
          class="form-control"
        />
        <input
          type="text"
          id="city"
          placeholder="Enter your city"
          class="form-control"
        />
      </div>
    </div>

    <hr />
    <div class="text-center">
      <button class="btn text-center btn-primary" onclick="Submit()">
        Submit
      </button>
    </div>
    <hr />

    <div
      class="container border text-warning rounded shadow p-4 divHide"
      id="dataCard"
    >
      <p><b>Name:</b> <span id="myName"></span></p>
      <p><b>City:</b> <span id="myCity"></span></p>
    </div>

    <div class="container mt-5">
      <div class="d-flex flex-column gap-3">
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          class="form-control"
        />
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          class="form-control"
        />
      </div>
    </div>

    <hr />
    <div class="text-center">
      <button class="btn text-center btn-primary" onclick="notSubmit()">
        Submit
      </button>
    </div>

    <div
      class="container bg-secondary border text-warning rounded shadow p-4 divHide"
      id="dataCard-1"
    >
      <p><b>Email:</b> <span id="myEmail"></span></p>
      <p><b>Password:</b> <span id="myPassword"></span></p>
    </div>

    <div class="container mt-5">
      <div class="d-flex flex-column gap-3">
        <input
          type="text"
          id="firstName"
          placeholder="Enter your firstName"
          class="form-control"
        />
        <input
          type="text"
          id="lastname"
          placeholder="Enter your lastname"
          class="form-control"
        />
      </div>
    </div>

    <hr />
    <div class="text-center">
      <button class="btn text-center btn-primary" onclick="onSubmit()">
        Submit
      </button>
    </div>
    <hr />

    <div
      class="container border bg-success text-warning rounded shadow p-4 divHide"
      id="dataCard-2"
    >
      <p>
        <b>Name:</b> <span id="firstName"></span> <span id="lastName"></span>
      </p>
    </div>

    <!-- ...Scripts... -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
